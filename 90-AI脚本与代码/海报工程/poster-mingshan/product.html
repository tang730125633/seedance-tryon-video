<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<style>
:root{
  --o1:#e8a85a; --o2:#d9863a; --o3:#c46a2c; --od:#9c4e1c;
  --cream:#fbf3e3; --cream2:#f4e6cd; --gold:#caa24a;
  --ink:#5b3a1e; --ink2:#977a59; --paper:#fff9ef;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#888;}
.os{font-family:"Oswald",sans-serif;}
.poster{width:824px;margin:0 auto;position:relative;color:var(--ink);overflow:hidden;
  font-family:"Noto Sans SC","PingFang SC",sans-serif;
  background:linear-gradient(165deg,#fdf7ea 0%,#f7e9d0 40%,#f0dcb8 74%,#ecd3a8 100%);}
.poster::before{content:"";position:absolute;top:-180px;right:-120px;width:560px;height:560px;border-radius:50%;
  background:radial-gradient(circle,rgba(255,255,255,.6),transparent 65%);z-index:0;}
.poster::after{content:"";position:absolute;bottom:-160px;left:-150px;width:540px;height:540px;border-radius:50%;
  background:radial-gradient(circle,rgba(217,134,58,.16),transparent 68%);z-index:0;}
.wrap{position:relative;z-index:2;padding:0 0 42px;}

/* 顶栏 */
.top{display:flex;justify-content:space-between;align-items:center;padding:30px 44px 0;}
.brand{display:flex;align-items:center;gap:12px;}
.brand .lf{width:48px;height:48px;border-radius:14px 14px 14px 4px;background:linear-gradient(145deg,var(--o1),var(--o3));
  color:#fff;display:flex;align-items:center;justify-content:center;font-size:23px;box-shadow:0 6px 14px rgba(156,78,28,.35);}
.brand .bn{font-weight:900;font-size:22px;letter-spacing:2px;}
.brand .bs{font-size:11px;color:var(--ink2);letter-spacing:4px;margin-top:2px;}
.tagpill{background:rgba(255,255,255,.72);border:1px solid rgba(217,134,58,.4);color:var(--o3);
  font-size:12px;font-weight:700;padding:7px 16px;border-radius:30px;letter-spacing:1px;}

/* 主视觉 */
.headline{padding:22px 44px 0;position:relative;}
.h-badge{display:inline-flex;align-items:center;gap:7px;background:linear-gradient(135deg,#f0d28a,var(--gold));
  color:#5a4410;font-size:12.5px;font-weight:800;padding:6px 15px;border-radius:30px;letter-spacing:1px;box-shadow:0 4px 10px rgba(202,162,74,.35);}
.h-name{font-size:50px;font-weight:900;line-height:1.1;margin:15px 0 4px;color:var(--od);letter-spacing:1px;}
.h-name em{font-style:normal;color:var(--o2);}
.h-en{font-family:"Oswald",sans-serif;font-size:14px;font-weight:500;letter-spacing:3px;color:var(--ink2);text-transform:uppercase;}

/* 大标语 + 数字1 */
.slogan{display:flex;align-items:center;gap:18px;margin:18px 44px 0;
  background:rgba(255,255,255,.66);border:1px solid rgba(217,134,58,.3);border-radius:20px;padding:18px 24px;
  box-shadow:0 10px 24px rgba(156,78,28,.12);}
.slogan .big1{font-family:"Oswald",sans-serif;font-weight:700;font-size:96px;line-height:.78;color:var(--o2);
  text-shadow:3px 4px 0 rgba(217,134,58,.18);flex:none;}
.slogan .stx .l1{font-size:18px;color:var(--ink2);font-weight:600;}
.slogan .stx .l2{font-size:30px;font-weight:900;color:var(--od);margin-top:2px;letter-spacing:1px;}
.slogan .stx .l2 b{color:var(--o2);}
.slogan .stx .l3{font-size:13.5px;color:var(--ink2);margin-top:8px;letter-spacing:1px;}

/* 产品图 */
.pwrap{margin:22px 44px 0;position:relative;}
.pwrap .pcard{border-radius:22px;overflow:hidden;box-shadow:0 18px 40px rgba(156,78,28,.24);border:5px solid #fff;}
.pwrap .pcard img{width:100%;display:block;}
.pwrap .float{position:absolute;right:-8px;top:-16px;background:linear-gradient(145deg,var(--o1),var(--o3));color:#fff;
  border-radius:50%;width:96px;height:96px;display:flex;flex-direction:column;align-items:center;justify-content:center;
  box-shadow:0 12px 26px rgba(156,78,28,.4);transform:rotate(8deg);border:3px solid #fff;}
.pwrap .float b{font-family:"Oswald";font-size:26px;line-height:1;}
.pwrap .float span{font-size:11px;margin-top:3px;}

/* 卖点 */
.sec-title{text-align:center;margin:32px 0 18px;}
.sec-title .t{font-size:27px;font-weight:900;color:var(--od);letter-spacing:1px;}
.sec-title .t i{color:var(--o2);margin:0 5px;}
.sec-title .s{font-size:12.5px;color:var(--ink2);margin-top:5px;letter-spacing:3px;}
.feats{display:grid;grid-template-columns:1fr 1fr;gap:14px;padding:0 44px;}
.feat{background:rgba(255,255,255,.8);border:1px solid rgba(217,134,58,.28);border-radius:18px;padding:18px;
  display:flex;gap:14px;align-items:flex-start;box-shadow:0 8px 20px rgba(217,134,58,.1);}
.feat .fi{width:52px;height:52px;flex:none;border-radius:14px;background:linear-gradient(145deg,#fbeacb,#f3d6a4);
  color:var(--o3);display:flex;align-items:center;justify-content:center;font-size:23px;}
.feat .ft{font-size:17px;font-weight:800;color:var(--od);}
.feat .fd{font-size:12.5px;color:var(--ink2);line-height:1.6;margin-top:4px;}

/* 场景 */
.scene{display:flex;justify-content:center;gap:34px;padding:26px 44px 4px;}
.scene .sc{text-align:center;}
.scene .sc .ci{width:58px;height:58px;border-radius:50%;background:#fff;border:2px solid var(--o1);color:var(--o3);
  display:flex;align-items:center;justify-content:center;font-size:23px;margin:0 auto;box-shadow:0 6px 14px rgba(217,134,58,.2);}
.scene .sc .cn{font-size:13px;font-weight:700;color:var(--ink);margin-top:8px;}

/* 规格条 */
.spec{margin:28px 44px 0;background:linear-gradient(135deg,var(--o2),var(--od));border-radius:18px;
  padding:18px 20px;display:flex;justify-content:space-around;align-items:center;color:#fff;box-shadow:0 12px 26px rgba(156,78,28,.32);}
.spec .sp{text-align:center;}
.spec .sp .l{font-size:11.5px;opacity:.85;}
.spec .sp .v{font-size:16px;font-weight:800;margin-top:3px;}
.spec .sp .v b{font-family:"Oswald";font-size:22px;}
.spec .dv{width:1px;height:34px;background:rgba(255,255,255,.3);}

/* CTA */
.cta{margin:26px 44px 0;background:rgba(255,255,255,.84);border:1px solid rgba(217,134,58,.32);border-radius:20px;
  padding:22px 26px;text-align:center;box-shadow:0 10px 26px rgba(217,134,58,.16);}
.cta .ct{font-size:25px;font-weight:900;color:var(--od);}
.cta .ct i{color:var(--o2);}
.cta .cs{font-size:13.5px;color:var(--ink2);margin-top:8px;line-height:1.7;}

.foot{text-align:center;margin-top:28px;}
.foot .sl{font-size:32px;font-weight:900;color:var(--o2);letter-spacing:3px;}
.foot .sl i{color:var(--gold);}
.foot .fn{font-size:11px;color:var(--ink2);margin-top:10px;letter-spacing:1px;}
</style>
</head>
<body>
<div class="poster" id="poster">
  <div class="wrap">
    <div class="top">
      <div class="brand"><div class="lf"><i class="fa-solid fa-mug-hot"></i></div>
        <div><div class="bn">明膳<sup style="font-size:11px">®</sup></div><div class="bs">MINGSHAN</div></div></div>
      <div class="tagpill"><i class="fa-solid fa-leaf"></i> 体重管理 · 营养代餐</div>
    </div>

    <div class="headline">
      <span class="h-badge"><i class="fa-solid fa-bolt"></i> 轻燃奶昔 · 固体饮料</span>
      <div class="h-name">轻燃<em>奶昔</em></div>
      <div class="h-en">Light-Burn Meal Shake</div>
    </div>

    <div class="slogan">
      <div class="big1">1</div>
      <div class="stx">
        <div class="l1">这不是解馋奶茶——</div>
        <div class="l2">这就是 <b>① 餐</b></div>
        <div class="l3">低卡饱腹 · 营养代餐 · 一杯顶一餐</div>
      </div>
    </div>

    <div class="pwrap">
      <div class="pcard"><img src="assets/product.png"></div>
      <div class="float"><b>30g</b><span>×7 袋</span></div>
    </div>

    <div class="sec-title"><div class="t">为什么选 <i class="fa-solid fa-mug-hot"></i> 轻燃奶昔</div><div class="s">CORE ADVANTAGES · 四大轻盈优势</div></div>
    <div class="feats" id="feats"></div>

    <div class="scene" id="scene"></div>

    <div class="spec">
      <div class="sp"><div class="l">净含量</div><div class="v"><b>30</b>g×7</div></div><div class="dv"></div>
      <div class="sp"><div class="l">食用</div><div class="v">每日 1 餐</div></div><div class="dv"></div>
      <div class="sp"><div class="l">分类</div><div class="v">固体饮料</div></div><div class="dv"></div>
      <div class="sp"><div class="l">规格</div><div class="v">7 天轻盈装</div></div>
    </div>

    <div class="cta">
      <div class="ct">夏天轻盈，从 <i class="fa-solid fa-mug-hot"></i> 一杯开始</div>
      <div class="cs">30 秒冲泡即饮 · 早餐 / 加班 / 减脂期都能顶一餐<br>扛饿不馋嘴，把热量交给我们，把轻盈留给你</div>
    </div>

    <div class="foot"><div class="sl">轻盈一夏 <i class="fa-solid fa-fire"></i> 燃动每一天</div>
      <div class="fn">明膳® · 轻燃奶昔 · 固体饮料 · 净含量 30g×7 袋</div></div>
  </div>
</div>
<script>
const FEATS=[
  ["fa-fire-flame-curved","低卡控热量","一杯替代一餐，热量清清楚楚，吃得明白不焦虑"],
  ["fa-wheat-awn","强饱腹扛饿","膳食纤维 + 优质蛋白，扎实饱腹感，告别下午茶诱惑"],
  ["fa-seedling","营养不亏待","多种营养素科学配比，代餐也均衡，状态在线"],
  ["fa-bolt","冲泡即饮","30 秒一杯，温水一摇就好，再忙也能稳住身材"],
];
const SCENE=[["fa-weight-scale","减脂期"],["fa-briefcase","上班族"],["fa-bread-slice","早餐代餐"],["fa-dumbbell","健身控卡"]];
document.getElementById('feats').innerHTML=FEATS.map(f=>`<div class="feat"><div class="fi"><i class="fa-solid ${f[0]}"></i></div><div><div class="ft">${f[1]}</div><div class="fd">${f[2]}</div></div></div>`).join('');
document.getElementById('scene').innerHTML=SCENE.map(s=>`<div class="sc"><div class="ci"><i class="fa-solid ${s[0]}"></i></div><div class="cn">${s[1]}</div></div>`).join('');
document.fonts.ready.then(()=>{window.__fontsready=true;});
</script>
</body>
</html>
